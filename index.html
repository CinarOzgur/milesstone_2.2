<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIC Safety Hub - Environmental Factors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col tracking-wide selection:bg-amber-500 selection:text-gray-900">

    <nav class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex justify-between items-center sticky top-0 z-50 backdrop-blur-md bg-opacity-90">
        <div class="flex items-center space-x-8">
            <span class="text-blue-400 font-bold text-base tracking-wider flex items-center gap-2 font-mono">
                [<i class="fa-solid fa-shield-halved text-sm animate-pulse"></i> VIC SAFETY HUB]
            </span>
            <div class="hidden md:flex space-x-6 text-xs uppercase font-medium tracking-widest">
                <a href="#" class="text-gray-400 hover:text-white transition duration-200">Home</a>
                <a href="#" class="text-blue-400 font-semibold border-b-2 border-blue-500 pb-4 pt-1 mt-3">[Analysis (Active)]</a>
                <a href="#" class="text-gray-400 hover:text-white transition duration-200">Settings</a>
            </div>
        </div>
        <div class="flex items-center space-x-4 text-xs font-mono">
            <i class="fa-solid fa-triangle-exclamation text-amber-500 animate-bounce"></i>
            <span class="text-gray-300">James (Engineer)</span>
            <span class="text-gray-600">|</span>
            <a href="#" class="text-gray-400 hover:text-rose-400 transition"><i class="fa-solid fa-right-from-bracket"></i></a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-6 space-y-6 flex-1 w-full">
        
        <div class="text-[11px] font-mono text-gray-500 flex items-center gap-2 uppercase tracking-wider">
            <i class="fa-solid fa-thumbtack text-rose-500 text-xs"></i>
            <span>Dashboard</span> <span class="text-gray-700">&gt;</span> <span>Analytics</span> <span class="text-gray-700">&gt;</span> <span class="text-gray-300 font-bold">Environmental Factors</span>
        </div>

        <section class="bg-gray-900 border border-gray-800 rounded-xl p-5 shadow-2xl relative overflow-hidden before:absolute before:top-0 before:left-0 before:w-1 before:h-full before:bg-purple-500">
            <h2 class="text-xs font-bold text-purple-400 uppercase tracking-widest mb-4 flex items-center gap-2 font-mono">
                <i class="fa-regular fa-file-lines"></i> LEVEL 1: STRATEGIC SUMMARY (Case Baselines)
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="bg-gray-950 p-4 rounded-lg border border-gray-800/80 transition hover:border-purple-500/30">
                    <div id="m-fatalities" class="text-2xl font-bold text-rose-400 font-mono tracking-tight">+13% Surge</div>
                    <div class="text-xs text-gray-400 mt-1 font-medium">Regional Fatalities</div>
                </div>
                <div class="bg-gray-950 p-4 rounded-lg border border-gray-800/80 transition hover:border-purple-500/30">
                    <div class="text-2xl font-bold text-amber-400 font-mono tracking-tight">16% Link</div>
                    <div class="text-xs text-gray-400 mt-1 font-medium">Smartphone Distraction</div>
                </div>
                <div class="bg-gray-950 p-4 rounded-lg border border-gray-800/80 transition hover:border-purple-500/30">
                    <div class="text-2xl font-bold text-blue-400 font-mono tracking-tight">2/3 Cases</div>
                    <div class="text-xs text-
